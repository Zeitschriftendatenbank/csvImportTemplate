<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>CSV-Template-Import</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="./W4DialogFunctions.js"></script>
    <script src="./ZDB_DialogFunctions.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 2em;
            max-width: 700px;
        }

        .dialog {
            border: 1px solid #ccc;
            padding: 1.5em;
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 1.5em;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 1em;
            gap: 1em;
        }

        label {
            min-width: 14em;
            margin-right: 1em;
        }

        select,
        input[type="text"],
        input[type="number"] {
            width: 16em;
            padding: 0.3em;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5em;
            margin-bottom: 1em;
        }

        .button-group {
            margin-top: 2em;
            text-align: right;
        }

        button {
            padding: 0.5em 1.2em;
            margin-left: 0.5em;
            border: none;
            border-radius: 4px;
            background: #0066cc;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0052a3;
        }

        .cancel {
            background: #666;
        }

        .cancel:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <form id="csvImportForm" onsubmit="onAccept(event); return false;">
        <div class="dialog">
            <div class="form-group">
                <div class="form-row">
                    <label for="idFileListdatenmasken">Bitte wählen Sie eine Datenmaske aus:</label>
                    <select id="idFileListdatenmasken" name="datenmaske"></select>
                </div>
                <div class="form-row">
                    <label for="idFileListcsv">Bitte wählen Sie eine CSV/TSV/SSV-Datei aus:</label>
                    <select id="idFileListcsv" name="csvfile"></select>
                </div>
                <div class="form-row">
                    <label for="separator">Bitte wählen Sie einen Separator aus:</label>
                    <select id="separator" name="separator">
                        <option value=",">Komma</option>
                        <option value=";">Semikolon</option>
                        <option value="t" selected>Tab</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="start">Lese ab Zeile ... (Wert >= 2; 1 = Header)</label>
                    <input type="number" id="start" name="start" value="2" min="2" placeholder="2">
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="idCheckboxTest" name="test" checked>
                    <label for="idCheckboxTest">Generiere nur einen Testsatz!</label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="idCheckboxNorm" name="norm">
                    <label for="idCheckboxNorm">Generiere Normdaten!</label>
                </div>
                <div class="form-row">
                    <label for="counter">{##} zählt hoch ab</label>
                    <input type="number" id="counter" name="counter" value="1" min="1">
                </div>
            </div>
            <div class="button-group">
                <button type="button" onclick="onCancel();" class="cancel">Abbrechen</button>
                <button type="submit">OK</button>
            </div>
        </div>
    </form>
    <script>
        var currentFilename = "";
        var currentIndex = 0;
        // Example: You should implement these functions in zdb_import.js
        const onLoad = async () => {
            try {
                const datenmaskenStr = await runScript('__zdb_csvImportTemplate_loadDatenmasken()');
                var datenmasken = (datenmaskenStr || "").split("@@@");
                populateSelects("datenmasken", datenmasken);
                const csvStr = await runScript('__zdb_csvImportTemplate_loadCsv()');
                var csv = (csvStr || "").split("@@@");
                populateSelects("csv", csv);
            } catch (e) {
                alert('Fehler beim Laden des Dialogs: ' + e.message);
                closeDialog();
            }
        };

        const populateSelects = (where, what) => {
            const theFileList = document.getElementById("idFileList" + where);
            while (theFileList.firstChild) { theFileList.removeChild(theFileList.firstChild); }
            for (let i = 0; i < what.length; i++) {
                const theEle = document.createElement("option");
                theEle.setAttribute("label", what[i]);
                theEle.setAttribute("value", what[i]);
                theFileList.appendChild(theEle);
                if (what[i] == currentFilename) {
                    currentIndex = i;
                }
            }
            document.getElementById("idFileList" + where).selectedIndex = currentIndex;
        }
        
        const onAccept = async (event) => {
            try {
                await runScript_afterCloseDialog('__zdb_csvImportTemplate_runImport');
                closeDialog();
            } catch (e) {
                alert('Fehler beim Ausführen: ' + e.message);
            }
        }

        const onCancel = () => {
            closeDialog();
        }

        (async () => {
            try {
                const scr = await getValueOfVariable('scr');
                if ('8A#7A#SC'.indexOf(scr) > -1) {
                    await onLoad();
                } else {
                    alert('Die Funktion kann von diesem Schirm aus nicht aufgerufen werden.');
                    closeDialog();
                }
            } catch (e) {
                alert('Fehler beim Starten des Dialogs: ' + e.message);
                closeDialog();
            }
        })();
    </script>
</body>

</html>
